version: '3.8'

services:
  # Database service (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Application service
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database connection URL for Prisma
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-finance_db}?schema=public
      # JWT secret for authentication
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      # DeepSeek API Key (provide this in your .env file)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
