services:
  # Application service
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database connection URL for Prisma
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}>
      # JWT secret for authentication
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here}
      # DeepSeek API Key (provide this in your .env file)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      NODE_ENV: production